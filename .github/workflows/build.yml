name: Build Master RSS

on:
  workflow_dispatch:
  schedule:
    # Every 15 minutes. We can tune later.
    - cron: "*/15 * * * *" 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser pyyaml

      - name: Run build
        run: |
          python build.py

      - name: Commit updated feeds and state
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add master.xml loot.xml state.json
      
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update master feed"
            git push
          fi
